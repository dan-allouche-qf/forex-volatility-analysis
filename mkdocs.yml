site_name: FX Volatility, Risk & Strategy
site_description: Conditional volatility, backtested VaR/ES and FX strategies — a reproducible quant study.
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
  features:
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            docstring_style: google
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

nav:
  - Overview: index.md
  - API reference: api.md
